package:
  name: toolkit
  version: "0.1.0"

source:
  url: https://github.com/sansh0u/toolkit/archive/refs/tags/v0.1.0.tar.gz
  fn: toolkit-0.1.0.tar.gz

  url: https://sourceforge.net/projects/bbmap/files/BBMap_39.80.tar.gz/download
  fn: BBMap_39.80.tar.gz

  git_url: https://github.com/sdparekh/zUMIs.git
  git_rev: 2039a90913b1b12e4fa48212fe6054badc1d1c09
  folder: zUMIs
build:
  noarch: python
  script: | 
    set -e
    cd $SRC_DIR
  
    tar -xzf BBTools.tar.gz 
    rm BBTools.tar.gz

    mkdir -p $PREFIX/share/bbmap
    cp -r bbmap/* $PREFIX/share/bbmap/

    mkdir -p $PREFIX/bin
    echo '#!/bin/bash' > $PREFIX/bin/bbduk
    echo 'bash $PREFIX/share/bbtools/bbduk.sh "$@"' >> $PREFIX/bin/bbduk
    chmod +x $PREFIX/bin/bbduk

    cd $SRC_DIR
    {{ PYTHON }} -m pip install . --no-deps -vv #在测试时加-vv

requirements:
  host:
    - python >=3.10
    - pip
  run:
    - python >=3.10
    - biopython
    - pyyaml
    - chromap
    - openjdk
about:
  home: https://github.com/sansh0u/toolkit
  summary: "My bioinformatics tool"
  license: GPL-3.0
  license_file: LICENSE